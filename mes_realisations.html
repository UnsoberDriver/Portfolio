    <title>Mes réalisations</title>
    <link rel="stylesheet" href="Styles/Styles.css">
    <script>
        (function () {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.add('theme-light');
            }
        })();

        function toggleTheme() {
            var root = document.documentElement;
            root.classList.toggle('theme-light');
            var isLight = root.classList.contains('theme-light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            var isLight = document.documentElement.classList.contains('theme-light');
            document.querySelectorAll('.theme-toggle').forEach(function (btn) {
                btn.textContent = isLight ? '☾' : '☀';
            });
        }

        document.addEventListener('DOMContentLoaded', updateThemeIcon);
    </script>
</head>

    <div class="video-container">

        <img id="videoTrigger" src="./icones/icone_plus.png" alt="Lancer la vidéo" class="video-icon">

        <video id="myVideo" class="video-player">
            <source src="./vidéo/INTS1.mp4" type="video/mp4">
        </video>

    </div>

    <script>
        const trigger = document.getElementById("videoTrigger");
        const video = document.getElementById("myVideo");
        let hasPlayed = false;

        trigger.addEventListener("click", () => {
            if (hasPlayed) return;

            hasPlayed = true;
            trigger.style.display = "none";
            video.style.display = "block";
            video.play();
        });
    </script>
